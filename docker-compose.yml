services:
  app:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3000
      - BASE_URL=${BASE_URL:-https://gehaltsdeckel.jetzt}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://gehaltsdeckel.jetzt,https://gehaltsdeckel-jetzt.de}
      - NODE_ENV=production
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${GMAIL_USER}
      - SMTP_PASS=${GMAIL_APP_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:18-alpine
    profiles:
      - with-db
    environment:
      - POSTGRES_DB=diaetendeckel
      - POSTGRES_USER=diaetendeckel
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diaetendeckel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
