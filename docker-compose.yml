services:
  app:
    build: .
    environment:
      - DATABASE_PATH=/app/data/diaetendeckel.db
      - DATABASE_ENCRYPTION_KEY=${DATABASE_ENCRYPTION_KEY}
      - PORT=3000
      - BASE_URL=${BASE_URL:-https://gehaltsdeckel.jetzt}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://gehaltsdeckel.jetzt,https://gehaltsdeckel-jetzt.de}
      - NODE_ENV=production
      - ADMIN_PATH=${ADMIN_PATH}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=${RESEND_FROM:-"Gehaltsdeckel Initiative" <noreply@gehaltsdeckel.jetzt>}
      - BACKUP_DIR=/app/backups
      - BACKUP_KEEP=${BACKUP_KEEP:-48}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      - TRUST_PROXY=${TRUST_PROXY:-true}
    volumes:
      - data:/app/data
      - backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  data:
  backups:
